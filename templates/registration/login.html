{% extends 'base.html' %}
{% block title %}Account Authentication Login{% endblock %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-3">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 fw-bold">Portal Access</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">Authenticate Log In</button>
                </form>
                <div class="text-center mt-3 small">
                    Need a portal entry? <a href="{% url 'signup' %}" class="text-decoration-none">Register Here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
