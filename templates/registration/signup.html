{% extends 'base.html' %}
{% block title %}New User Portal Registration{% endblock %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-3">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 fw-bold">Register Profile</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 shadow-sm">Complete Enrollment Registration</button>
                </form>
                <div class="text-center mt-3 small">
                    Already have credentials? <a href="{% url 'login' %}" class="text-decoration-none">Sign In Here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
